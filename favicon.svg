<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="g2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#g1)"/>
  <!-- Neural network nodes -->
  <!-- Input layer -->
  <circle cx="10" cy="20" r="4" fill="white" fill-opacity="0.9"/>
  <circle cx="10" cy="32" r="4" fill="white" fill-opacity="0.9"/>
  <circle cx="10" cy="44" r="4" fill="white" fill-opacity="0.9"/>
  <!-- Hidden layer 1 -->
  <circle cx="27" cy="14" r="4" fill="white" fill-opacity="0.75"/>
  <circle cx="27" cy="26" r="4" fill="white" fill-opacity="0.75"/>
  <circle cx="27" cy="38" r="4" fill="white" fill-opacity="0.75"/>
  <circle cx="27" cy="50" r="4" fill="white" fill-opacity="0.75"/>
  <!-- Hidden layer 2 -->
  <circle cx="44" cy="20" r="4" fill="white" fill-opacity="0.75"/>
  <circle cx="44" cy="32" r="4" fill="white" fill-opacity="0.75"/>
  <circle cx="44" cy="44" r="4" fill="white" fill-opacity="0.75"/>
  <!-- Output node (glowing) -->
  <circle cx="57" cy="32" r="5" fill="#fbbf24"/>
  <!-- Connections: input -> hidden1 (sample subset) -->
  <line x1="14" y1="20" x2="23" y2="14" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="14" y1="20" x2="23" y2="26" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="14" y1="32" x2="23" y2="26" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="14" y1="32" x2="23" y2="38" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="14" y1="44" x2="23" y2="38" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="14" y1="44" x2="23" y2="50" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Connections: hidden1 -> hidden2 -->
  <line x1="31" y1="14" x2="40" y2="20" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="31" y1="26" x2="40" y2="20" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="31" y1="26" x2="40" y2="32" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="31" y1="38" x2="40" y2="32" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="31" y1="38" x2="40" y2="44" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <line x1="31" y1="50" x2="40" y2="44" stroke="white" stroke-opacity="0.35" stroke-width="1"/>
  <!-- Connections: hidden2 -> output (highlighted) -->
  <line x1="48" y1="20" x2="52" y2="32" stroke="#fbbf24" stroke-opacity="0.8" stroke-width="1.5"/>
  <line x1="48" y1="32" x2="52" y2="32" stroke="#fbbf24" stroke-opacity="0.8" stroke-width="1.5"/>
  <line x1="48" y1="44" x2="52" y2="32" stroke="#fbbf24" stroke-opacity="0.8" stroke-width="1.5"/>
</svg>
